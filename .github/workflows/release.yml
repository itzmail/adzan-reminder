name: Release Multi-Platform Binaries

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            bin_name: adzan
            menubar_arch: x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            bin_name: adzan
            menubar_arch: arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin_name: adzan
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            bin_name: adzan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install cross (for Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Build menu bar helper (macOS only)
        if: ${{ matrix.menubar_arch != '' }}
        run: |
          bash menubar/build.sh ${{ matrix.menubar_arch }}
          test -f target/adzan-menubar

      - name: Archive binary
        run: |
          cd target/${{ matrix.target }}/release
          cp -r ../../../assets ./
          if [ -f "../../adzan-menubar" ]; then
            cp ../../adzan-menubar ./
            tar -czf adzan-${{ matrix.target }}.tar.gz adzan adzan-menubar assets/
          else
            tar -czf adzan-${{ matrix.target }}.tar.gz adzan assets/
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/adzan-${{ matrix.target }}.tar.gz
